<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - UID Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000000;
            min-height: 100vh;
            padding: 20px;
            color: #ffffff;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 20px 0;
            border-bottom: 1px solid #1a1a1a;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #00ff41;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: #888;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #00ff41;
        }

        .logout-btn {
            padding: 8px 16px;
            background: transparent;
            color: #ff4444;
            border: 1px solid #333;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #ff4444;
            color: #000;
        }

        .card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .card h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 24px;
            color: #fff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #888;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #222;
            border-radius: 8px;
            font-size: 15px;
            background: #111;
            color: #fff;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00ff41;
        }

        .btn {
            padding: 12px 24px;
            background: #00ff41;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn.danger {
            background: #ff4444;
            color: #fff;
        }

        .user-list {
            margin-top: 20px;
        }

        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-icon {
            width: 40px;
            height: 40px;
            background: #1a1a1a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .user-name {
            font-weight: 500;
            color: #fff;
        }

        .user-role {
            font-size: 12px;
            color: #00ff41;
            background: rgba(0, 255, 65, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .delete-btn {
            padding: 8px 16px;
            background: transparent;
            color: #ff4444;
            border: 1px solid #ff4444;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: #ff4444;
            color: #000;
        }

        .result {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        .result.error {
            display: block;
            background: rgba(255, 68, 68, 0.1);
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.2);
        }

        .result.success {
            display: block;
            background: rgba(0, 255, 65, 0.1);
            color: #00ff41;
            border: 1px solid rgba(0, 255, 65, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ Admin Dashboard</h1>
            <div class="nav-links">
                <a href="index.html">UID Manager</a>
                <button onclick="logout()" class="logout-btn">Logout</button>
            </div>
        </div>

        <div class="card">
            <h2>Add New User</h2>
            <form id="addUserForm">
                <div class="form-group">
                    <label for="newUsername">Username</label>
                    <input type="text" id="newUsername" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label for="newPassword">Password</label>
                    <input type="password" id="newPassword" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn">Add User</button>
            </form>
            <div id="addResult" class="result"></div>
        </div>

        <div class="card">
            <h2>Manage Users</h2>
            <div id="userList" class="user-list">
                <p style="color: #666; text-align: center;">Loading users...</p>
            </div>
        </div>
    </div>

    <script>
        // Check if admin is logged in
        const token = localStorage.getItem('authToken');
        const username = localStorage.getItem('username');
        
        if (!token || username !== 'admin') {
            alert('Admin access required!');
            window.location.href = 'login.html';
        }

        // Load users
        async function loadUsers() {
            try {
                const response = await fetch('/api/users', {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                if (!response.ok) throw new Error('Failed to load users');
                
                const users = await response.json();
                displayUsers(users);
            } catch (error) {
                document.getElementById('userList').innerHTML = 
                    '<p style="color: #ff4444; text-align: center;">Failed to load users</p>';
            }
        }

        function displayUsers(users) {
            const container = document.getElementById('userList');
            
            if (users.length === 0) {
                container.innerHTML = '<p style="color: #666; text-align: center;">No users found</p>';
                return;
            }
            
            container.innerHTML = users.map(user => `
                <div class="user-item">
                    <div class="user-info">
                        <div class="user-icon">👤</div>
                        <div>
                            <div class="user-name">${user.username}</div>
                            ${user.isAdmin ? '<span class="user-role">ADMIN</span>' : ''}
                        </div>
                    </div>
                    ${!user.isAdmin ? `<button onclick="deleteUser('${user.username}')" class="delete-btn">Delete</button>` : ''}
                </div>
            `).join('');
        }

        // Add user
        document.getElementById('addUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('newUsername').value.trim();
            const password = document.getElementById('newPassword').value;
            const resultDiv = document.getElementById('addResult');
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to add user');
                }
                
                resultDiv.className = 'result success';
                resultDiv.textContent = 'User added successfully!';
                
                // Clear form
                document.getElementById('newUsername').value = '';
                document.getElementById('newPassword').value = '';
                
                // Reload user list
                loadUsers();
                
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = error.message;
            }
        });

        // Delete user
        async function deleteUser(username) {
            if (!confirm(`Are you sure you want to delete user "${username}"?`)) {
                return;
            }
            
            try {
                const response = await fetch('/api/users/' + username, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.error || 'Failed to delete user');
                }
                
                // Reload user list
                loadUsers();
                
            } catch (error) {
                alert(error.message);
            }
        }

        // Logout
        async function logout() {
            try {
                await fetch('/api/logout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
            } catch (e) {}
            
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // Load users on page load
        loadUsers();
    </script>
</body>
</html>
