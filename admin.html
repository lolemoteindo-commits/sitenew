<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000000;
            min-height: 100vh;
            padding: 20px;
            color: #ffffff;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-box {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .login-box h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .login-box p {
            color: #666666;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #888888;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #222222;
            border-radius: 8px;
            font-size: 15px;
            background: #111111;
            color: #ffffff;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00ff41;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #00ff41;
            color: #000000;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-danger {
            background: #1a1a1a;
            color: #ff4444;
            border: 1px solid #333333;
        }

        .btn-danger:hover {
            background: #ff4444;
            color: #000000;
            opacity: 1;
        }

        .btn-success {
            background: #00ff41;
            color: #000000;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 13px;
            width: auto;
        }

        .result {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            font-weight: 500;
        }

        .result.error {
            display: block;
            background: rgba(255, 68, 68, 0.1);
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.2);
        }

        .result.success {
            display: block;
            background: rgba(0, 255, 65, 0.1);
            color: #00ff41;
            border: 1px solid rgba(0, 255, 65, 0.2);
        }

        /* Dashboard Styles */
        .dashboard {
            display: none;
            max-width: 900px;
            margin: 0 auto;
        }

        .dashboard-header {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dashboard-header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-tag {
            background: #00ff41;
            color: #000000;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
        }

        .card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .card h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .generate-section {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 16px;
            align-items: end;
        }

        .key-display {
            background: #111111;
            border: 1px dashed #333333;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
            display: none;
        }

        .key-display.show {
            display: block;
        }

        .generated-key {
            font-family: 'Courier New', monospace;
            font-size: 18px;
            font-weight: 600;
            color: #00ff41;
            background: #000000;
            border: 1px solid #222222;
            padding: 12px 20px;
            border-radius: 6px;
            margin: 12px 0;
            word-break: break-all;
        }

        .copy-btn {
            background: #00ff41;
            color: #000000;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .copy-btn:hover {
            opacity: 0.9;
        }

        .keys-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }

        .keys-table th,
        .keys-table td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid #1a1a1a;
        }

        .keys-table th {
            color: #666666;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            background: #111111;
        }

        .keys-table td {
            color: #aaaaaa;
            font-size: 14px;
        }

        .keys-table tr:hover {
            background: #111111;
        }

        .status-active {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 255, 65, 0.15);
            color: #00ff41;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-inactive {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 68, 68, 0.15);
            color: #ff4444;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .key-text {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #888888;
            background: #111111;
            padding: 6px 12px;
            border-radius: 4px;
            word-break: break-all;
        }

        .empty-state {
            text-align: center;
            padding: 48px;
            color: #444444;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <!-- Admin Login -->
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h1>Admin Login</h1>
            <p>Enter your master password to access the dashboard</p>
            
            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="adminPassword">Master Password</label>
                    <input type="password" id="adminPassword" placeholder="Enter master password" required>
                </div>
                <button type="submit" class="btn">Access Dashboard</button>
            </form>
            
            <div id="loginResult" class="result"></div>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div class="dashboard" id="dashboard">
        <div class="dashboard-header">
            <h1>
                Admin Dashboard
                <span class="admin-tag">ADMIN</span>
            </h1>
            <button class="btn btn-danger btn-small" onclick="adminLogout()">Logout</button>
        </div>

        <!-- Generate Key -->
        <div class="card">
            <h2>Generate New Key</h2>
            <div class="generate-section">
                <div class="form-group" style="margin-bottom: 0;">
                    <label>Key Duration (Days)</label>
                    <input type="number" id="keyDuration" value="30" min="1" max="365" placeholder="Days">
                </div>
                <button class="btn btn-success" onclick="generateKey()">Generate Key</button>
            </div>
            
            <div class="key-display" id="keyDisplay">
                <p style="color: #666666; font-size: 13px; margin-bottom: 8px;">Generated Key (Copy and share with user):</p>
                <div class="generated-key" id="generatedKey"></div>
                <button class="copy-btn" onclick="copyKey()">Copy Key</button>
            </div>
        </div>

        <!-- All Keys -->
        <div class="card">
            <h2>All Generated Keys</h2>
            <div id="keysList">
                <div class="empty-state">
                    <div class="empty-state-icon">No keys yet</div>
                    <p>No keys generated yet</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Admin master password
        const MASTER_PASSWORD = 'admin123';

        // Check if admin is logged in
        if (localStorage.getItem('adminLoggedIn') === 'true') {
            showDashboard();
        }

        // Admin login
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('adminPassword').value;
            const result = document.getElementById('loginResult');

            if (password === MASTER_PASSWORD) {
                localStorage.setItem('adminLoggedIn', 'true');
                showDashboard();
            } else {
                result.className = 'result error';
                result.textContent = 'Incorrect master password';
            }
        });

        function showDashboard() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadKeys();
        }

        function adminLogout() {
            localStorage.removeItem('adminLoggedIn');
            location.reload();
        }

        // Generate random key
        function generateKey() {
            const duration = parseInt(document.getElementById('keyDuration').value) || 30;
            const key = 'UID-' + Math.random().toString(36).substring(2, 8).toUpperCase() + '-' + 
                        Math.random().toString(36).substring(2, 6).toUpperCase();
            
            const createdAt = new Date().toISOString();
            const expiresAt = new Date();
            expiresAt.setDate(expiresAt.getDate() + duration);

            const keyData = {
                key: key,
                duration: duration,
                createdAt: createdAt,
                expiresAt: expiresAt.toISOString(),
                active: true
            };

            // Save to localStorage
            let keys = JSON.parse(localStorage.getItem('generatedKeys') || '[]');
            keys.push(keyData);
            localStorage.setItem('generatedKeys', JSON.stringify(keys));

            // Display key
            document.getElementById('generatedKey').textContent = key;
            document.getElementById('keyDisplay').classList.add('show');

            // Refresh list
            loadKeys();
        }

        // Copy key
        function copyKey() {
            const key = document.getElementById('generatedKey').textContent;
            navigator.clipboard.writeText(key).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = 'Copy Key', 2000);
            });
        }

        // Load all keys
        function loadKeys() {
            const keys = JSON.parse(localStorage.getItem('generatedKeys') || '[]');
            const container = document.getElementById('keysList');

            if (keys.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">No keys yet</div>
                        <p>No keys generated yet</p>
                    </div>
                `;
                return;
            }

            // Sort by newest first
            keys.reverse();

            let html = `
                <table class="keys-table">
                    <thead>
                        <tr>
                            <th>Key</th>
                            <th>Duration</th>
                            <th>Created</th>
                            <th>Expires</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            keys.forEach((keyData, index) => {
                const created = new Date(keyData.createdAt).toLocaleDateString();
                const expires = new Date(keyData.expiresAt).toLocaleDateString();
                const isExpired = new Date() > new Date(keyData.expiresAt);
                const isActive = keyData.active && !isExpired;

                html += `
                    <tr>
                        <td><span class="key-text">${keyData.key}</span></td>
                        <td>${keyData.duration} days</td>
                        <td>${created}</td>
                        <td>${expires}</td>
                        <td>
                            <span class="${isActive ? 'status-active' : 'status-inactive'}">
                                ${isActive ? 'Active' : 'Inactive'}
                            </span>
                        </td>
                        <td>
                            <button class="btn btn-danger btn-small" onclick="deleteKey(${keys.length - 1 - index})">Delete</button>
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // Delete key
        function deleteKey(index) {
            let keys = JSON.parse(localStorage.getItem('generatedKeys') || '[]');
            keys.splice(index, 1);
            localStorage.setItem('generatedKeys', JSON.stringify(keys));
            loadKeys();
        }
    </script>
</body>
</html>
